services:
  mongo:
    image: mongo:7
    container_name: certificate-cross-repo-mongo
    ports:
      - '27018:27017'
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'mongosh --host localhost:27017 --eval "db.adminCommand(\"ping\")"',
        ]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  mountebank:
    image: bbyars/mountebank:2.9.1
    container_name: certificate-cross-repo-mountebank
    command: ['--port', '2525', '--loglevel', 'warn']
    ports:
      - '2525:2525'
      - '5500:5500'
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "fetch('http://127.0.0.1:2525/imposters').then((response) => { if (!response.ok) process.exit(1); }).catch(() => process.exit(1))",
        ]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  certificate-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: certificate-cross-repo-app
    environment:
      PORT: '4000'
      EXTERNAL_CERTIFICATE_API_URL: http://mountebank:5500/provider/certificates
      EXTERNAL_CERTIFICATE_API_TIMEOUT_MS: '1000'
      EXTERNAL_CERTIFICATE_API_KEY: ''
    ports:
      - '4000:4000'
    depends_on:
      mountebank:
        condition: service_healthy
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "fetch('http://127.0.0.1:4000/health').then((response) => { if (!response.ok) process.exit(1); }).catch(() => process.exit(1))",
        ]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  enrollment-service:
    build:
      context: ${ENROLLMENT_SERVICE_DIR:-/Users/chaowarin/Downloads/enrollment-service/enrollment-service}
      dockerfile: Dockerfile
    container_name: certificate-cross-repo-enrollment-app
    environment:
      PORT: '3000'
      MONGO_URL: mongodb://mongo:27017
      MONGO_DB_NAME: enrollment_service
      MONGO_SEED_ON_START: 'true'
      CERTIFICATE_API_URL: http://certificate-service:4000/certificates
      CERTIFICATE_API_TIMEOUT_MS: '3000'
    ports:
      - '3000:3000'
    depends_on:
      mongo:
        condition: service_healthy
      certificate-service:
        condition: service_healthy
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "fetch('http://127.0.0.1:3000/health').then((response) => { if (!response.ok) process.exit(1); }).catch(() => process.exit(1))",
        ]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 15s
